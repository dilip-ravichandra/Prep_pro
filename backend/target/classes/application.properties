# ─── Server ───────────────────────────────────────
server.port=8080
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# ─── MongoDB ──────────────────────────────────────
# Use MongoDB Compass/local/Atlas URI via env var when needed.
# Example (Compass local): mongodb://127.0.0.1:27017/interviewsim
spring.data.mongodb.uri=${MONGODB_URI:mongodb://127.0.0.1:27017/interviewsim}
spring.data.mongodb.database=${MONGODB_DATABASE:interviewsim}

# ─── JWT ──────────────────────────────────────────
# REPLACE: generate a strong 256-bit secret key
app.jwt.secret=${JWT_SECRET:InterviewSimProSecretKey2025SuperLongSecureKeyForJWTTokenGeneration}
app.jwt.expiration=86400000
app.jwt.reset-expiration=120000

# ─── Dedicated Admin Auth ─────────────────────────
admin.auth.email=${ADMIN_AUTH_EMAIL:diliprbtech24@rvu.edu.in}
admin.auth.password=${ADMIN_AUTH_PASSWORD:12345678}
admin.auth.password-bcrypt=${ADMIN_AUTH_PASSWORD_BCRYPT:}

# ─── App ──────────────────────────────────────────
app.name=InterviewSimPro
app.version=1.0.0

# ─── CORS ─────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000

# ─── Frontend URL ─────────────────────────────────
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ─── Resume Upload ────────────────────────────────
app.upload.resume-dir=${RESUME_UPLOAD_DIR:uploads/resumes}
app.upload.video-dir=${VIDEO_UPLOAD_DIR:uploads/videos}
app.upload.audio-dir=${AUDIO_UPLOAD_DIR:uploads/audio}
app.ffmpeg.path=${FFMPEG_PATH:ffmpeg}
spring.servlet.multipart.max-file-size=150MB
spring.servlet.multipart.max-request-size=150MB

# ─── Groq AI ──────────────────────────────────────
app.ai.groq.api-key=${GROQ_API_KEY:}
app.ai.groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
app.ai.whisper.model=${WHISPER_MODEL:whisper-large-v3-turbo}

# ─── Email (SMTP) ─────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USER:}
spring.mail.password=${EMAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── Logging ──────────────────────────────────────
logging.level.com.interviewsim=DEBUG
logging.level.org.springframework.security=WARN
